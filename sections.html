  /* ─── SECTION 2: SLIDER ───────────────────────────────────────────────── */

  .slider-section {
    width: 100%;

    padding: 80px 0;
    font-family: 'Inter', sans-serif;
  }

  .slider-container {
    width: 1200px;
    background: #111111;
    border-radius: 16px;
    position: relative;
    margin: 0 auto;
  }

  .browser-mockup {
    margin: 60px;
    height: 600px;
    border: 1px solid #333;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .browser-top-bar {
    height: 32px;
    min-height: 32px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    background: #222;
    flex-shrink: 0;
  }

  .browser-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d9d9d9;
    flex-shrink: 0;
  }

  .browser-draft-label {
    font-size: 10px;
    color: #666;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-left: 8px;
  }

  .browser-content-area {
    flex: 1;
    background: #1A1A1A;
    border-radius: 0 0 12px 12px;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide.active {
    opacity: 1;
  }

  /* Placeholder slide content */
  .slide-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    height: 100%;
  }

  .slide-placeholder-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: rgba(20, 136, 252, 0.15);
    border: 1px solid rgba(20, 136, 252, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide-placeholder-icon svg {
    opacity: 0.7;
  }

  .slide-placeholder-label {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.5px;
  }

  /* Nav bar */
  .slider-nav {
    margin: 0 60px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .slider-tabs {
    display: flex;
    gap: 0;
  }

  .slider-tab {
    padding: 10px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    align-items: flex-start;
  }

  .slider-tab-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #555;
    transition: color 0.3s ease;
    white-space: nowrap;
  }

  .slider-tab.active .slider-tab-text {
    color: #ffffff;
  }

  .slider-tab-bar-track {
    width: 100%;
    height: 2px;
    background: #333;
    border-radius: 1px;
    overflow: hidden;
  }

  .slider-tab-bar-fill {
    height: 100%;
    width: 0%;
    background: #1488FC;
    border-radius: 1px;
    transition: none;
  }

  .slider-tab.active .slider-tab-bar-fill {
    /* width is animated via JS */
  }

  .slider-learn-more {
    font-size: 12px;
    color: #888;
    letter-spacing: 1.5px;
    font-weight: 500;
    white-space: nowrap;
    text-decoration: none;
    cursor: pointer;
  }
</style>

      <div class="browser-top-bar">

        <div class="browser-dot"></div>

        <!-- Slide 1 -->

        <div class="slide" id="slide-2">

              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z" fill="#1488FC"/>

                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="#1488FC"/>

<script>
  (function () {
    const DURATION = 4000;
    const slides = [1, 2, 3];
    let currentSlide = 1;
    let animationId = null;
    let startTime = null;

    const tabs = document.querySelectorAll('.slider-tab');

    function getTab(index) {
      return document.querySelector(`.slider-tab[data-slide="${index}"]`);
    }

    function getFill(tab) {
      return tab.querySelector('.slider-tab-bar-fill');
    }

    function setActiveSlide(index, startAnim) {
      // Update slides
      slides.forEach(function (i) {
        const el = document.getElementById('slide-' + i);
        if (el) el.classList.toggle('active', i === index);
      });

      // Update tabs
      tabs.forEach(function (tab) {
        const isActive = parseInt(tab.dataset.slide) === index;
        tab.classList.toggle('active', isActive);
        const fill = getFill(tab);
        if (!isActive) {
          fill.style.transition = 'none';
          fill.style.width = '0%';
        }
      });

      currentSlide = index;

      if (startAnim !== false) {
        startProgress();
      }
    }

    function startProgress() {
      if (animationId) cancelAnimationFrame(animationId);
      startTime = null;

      const activeTab = getTab(currentSlide);
      const fill = getFill(activeTab);

      // Reset fill instantly
      fill.style.transition = 'none';
      fill.style.width = '0%';

      // Force reflow
      void fill.offsetWidth;

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / DURATION, 1);

        fill.style.transition = 'none';
        fill.style.width = (progress * 100) + '%';

        if (progress < 1) {
          animationId = requestAnimationFrame(animate);
        } else {
          // Advance to next slide
          const next = (currentSlide % slides.length) + 1;
          setActiveSlide(next, true);
        }
      }

      animationId = requestAnimationFrame(animate);
    }

    // Tab click handlers
    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        const index = parseInt(tab.dataset.slide);
        if (index === currentSlide) return;
        setActiveSlide(index, true);
      });
    });

    // Kick off
    setActiveSlide(1, true);
  })();
</script>
